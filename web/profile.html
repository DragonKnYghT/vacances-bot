<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil — Serveur Vacances</title>
    <link rel="stylesheet" href="static/css/global.css">
    <style>
        /* ── Header profil ── */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }
        .profile-header img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
        }
        .profile-header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .3rem; }
        .profile-header .meta { color: var(--muted); font-size: .9rem; display: flex; gap: .75rem; flex-wrap: wrap; }

        /* ── Barres d'activité sur toute la largeur (Cadre Rouge) ── */
        .activity-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 100%;
        }
        .activity-row {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .activity-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .activity-label .pts {
            color: var(--accent);
            font-weight: 800;
        }
        .activity-container .progress-bar {
            height: 10px;
        }

        /* ── Layout pour afficher Race & Classe sur la même ligne ou en grille ── */
        .rpg-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (max-width: 768px) { .rpg-grid { grid-template-columns: 1fr; } }

        /* ── Cartes RPG (Classe & Race) ── */
        .rpg-card {
            background: linear-gradient(135deg, rgba(124,92,252,.1), var(--bg2));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
        }
        .rpg-card.active-card {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(124,92,252,.15), var(--bg2));
        }
        .rpg-name { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        .rpg-desc { color: var(--muted); font-size: .9rem; margin-top: .3rem; line-height: 1.4; }
        .rpg-bonus { margin-top: .75rem; font-size: .85rem; color: var(--text); }
        .rpg-bonus span { color: var(--green); font-weight: 700; }

        /* ── Matériaux ── */
        .materials {
            display: flex; gap: .75rem; flex-wrap: wrap;
        }
        .mat-badge {
            display: flex; align-items: center; gap: .4rem;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 8px; padding: .4rem .8rem;
            font-size: .9rem; font-weight: 600;
        }
        .mat-badge .mat-icon { font-size: 1.1rem; }

        /* ── Choix de classe ── */
        .classes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
        @media (max-width: 600px) { .classes-grid { grid-template-columns: 1fr 1fr; } }

        .class-option {
            background: var(--bg3); border: 2px solid var(--border);
            border-radius: 10px; padding: 1rem;
            cursor: pointer; transition: border-color .2s, background .2s;
            text-align: center;
        }
        .class-option:hover { border-color: var(--accent); background: rgba(124,92,252,.08); }
        .class-option .cls-icon { font-size: 2rem; margin-bottom: .4rem; }
        .class-option .cls-name { font-weight: 700; font-size: .95rem; }
        .class-option .cls-desc { font-size: .78rem; color: var(--muted); margin-top: .3rem; line-height: 1.4; }

        /* ── Mondes débloqués ── */
        .world-list { display: flex; gap: .75rem; flex-wrap: wrap; }
        .world-badge {
            display: flex; align-items: center; gap: .5rem;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 8px; padding: .5rem 1rem;
            font-size: .9rem;
        }
        .world-badge.unlocked { border-color: var(--green); color: var(--green); }
        .world-badge.locked   { color: var(--muted); }

        section { margin-bottom: 1.5rem; }
        section > h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; margin-bottom: .75rem; }
    </style>
</head>
<body>
<div id="main-content">
    <div class="loader"><div class="spinner"></div><span>Chargement du profil...</span></div>
</div>

<script type="module">
import { api, isLoggedIn, discordAvatar } from "./static/js/api.js";
import { renderNav, loadNavUser, requireAuth, toast, fmt } from "./static/js/ui.js";

renderNav("profile");
if (!requireAuth()) throw new Error("not auth");

const WORLDS = {
    monde_1: { name: "La Forêt des Débuts", icon: "🌲" },
    monde_2: { name: "Les Plaines de Feu",  icon: "🔥" },
    monde_3: { name: "L'Océan Profond",      icon: "🌊" },
    monde_4: { name: "Le Sommet des Dieux", icon: "⛰️" },
};

// Bonus et descriptions des Classes
const CLASSES_INFO = {
    guerrier:    { bonus_text: "−15% sur les améliorations de l'arbre" },
    mage:        { bonus_text: "−10% sur tous les objets de la boutique" },
    architecte:  { bonus_text: "Pixels de la Map à moitié prix" },
    marchand:    { bonus_text: "−20% sur tous les objets de la boutique" },
    explorateur: { bonus_text: "−25% de réduction pour débloquer les Mondes" },
};

// Descriptions et Avantages des Races
const RACES_INFO = {
    humain:   { name: "Humain",   icon: "🧑", desc: "Polyvalents et ambitieux, s'adaptent à toutes les situations.", bonus: "+5% de points globaux bonus" },
    elfe:     { name: "Elfe",     icon: "🧝", desc: "Créatures mystiques connectées à la magie et à la nature antique.", bonus: "Régénération de pixels 10% plus rapide" },
    nain:     { name: "Nain",     icon: "⛏️", desc: "Fiers mineurs des montagnes, robustes et experts en matériaux.", bonus: "+1 matériau aléatoire par achat en boutique" },
    orc:      { name: "Orc",      icon: "💪", desc: "Guerriers nés dotés d'une force brute et d'une fureur inégalable.", bonus: "+15% de points gagnés en vocal" },
    gobelin:  { name: "Gobelin",  icon: "👺", desc: "Malins et avares, toujours à la recherche d'un bon coup ou de pièces.", bonus: "+10% de pièces (Coins) bonus lors des gains" },
    demon:    { name: "Démon",    icon: "😈", desc: "Êtres des ombres manipulant les énergies sombres du serveur.", bonus: "+15% de points gagnés par message" },
    dragon:   { name: "Dragon",   icon: "🐉", desc: "Créatures légendaires majestueuses, craintes de tous.", bonus: "Accès gratuit au Monde 2 d'office" },
    titan:    { name: "Titan",    icon: "⚡", desc: "Géants primordiaux manipulant les forces de la foudre.", bonus: "Limite maximale de pixels stockables augmentée de +5" },
    halfelin: { name: "Halfelin", icon: "🍀", desc: "Petites créatures joviales qui possèdent une chance insolente.", bonus: "+5% de chances de drop critique au Gacha" },
    beastman: { name: "Beastman", icon: "🐾", desc: "Hybrides mi-humains mi-animaux aux sens extrêmement aiguisés.", bonus: "Immunité contre le coût de déplacement sur la Map" },
    ange:     { name: "Ange",     icon: "😇", desc: "Êtres célestes bienveillants apportant lumière et bénédictions.", bonus: "Partage 5% de ses points d'activité aux alliés proches" },
    fantome:  { name: "Fantôme",  icon: "👻", desc: "Esprits immatériels capables de traverser les obstacles.", bonus: "Peut poser des pixels par-dessus ceux des autres sans surcoût" },
    necromant:{ name: "Nécro",    icon: "💀", desc: "Maîtres de la mort réveillant d'anciennes reliques perdues.", bonus: "Permet de recycler les matériaux inutilisés contre des Coins" },
    phenix:   { name: "Phénix",   icon: "🔥", desc: "Oiseaux de feu immortels renaissant constamment de leurs cendres.", bonus: "Conserve ses bonus d'arbre même après un reset" },
    celeste:  { name: "Céleste",  icon: "⭐", desc: "Gardiens des étoiles observant le monde depuis le cosmos.", bonus: "Débloque des couleurs exclusives sur la Pixel Map" },
    ancien:   { name: "Ancien",   icon: "🌌", desc: "Entités intemporelles détenant les secrets de la création.", bonus: "Réduction globale de la boutique cumulable de 5%" }
};

const RACE_ICONS = { 
    "humain": "🧑", "gobelin": "👺", "orc": "💪", "halfelin": "🍀", "elfe": "🧝", 
    "nain": "⛏️", "demon": "😈", "beastman": "🐾", "dragon": "🐉", "ange": "😇", 
    "fantome": "👻", "necromant": "💀", "phenix": "🔥", "celeste": "⭐", "ancien": "🌌" 
};

// ── FIX ICI : Déclaration de MAT_ICONS réintégrée ──
const MAT_ICONS = { pierre:"🪨", bois:"🪵", fer:"⚙️", cristal:"💎", magie:"✨" };

async function init() {
    const profile = await api.getProfile();
    window.__profile = profile;
    await loadNavUser();

    // Fix Avatar
    const userId = profile.user_id || profile.discord_id;
    const avatarHash = profile.avatar_hash || profile.avatar || null;
    const avatarUrl = discordAvatar(userId, avatarHash, 128);

    // Activité
    const vocalPoints = profile.vocal_points || 0;
    const messagePoints = profile.message_points || 0;
    const maxPts = Math.max(vocalPoints, messagePoints, 1);

    const vocalPct = Math.round((vocalPoints / maxPts) * 100);
    const messagePct = Math.round((messagePoints / maxPts) * 100);

    // Normalisation des clés pour les dictionnaires
    const raceKey = profile.race_id ? profile.race_id.toLowerCase() : "";

    // Données de la race actuelle du joueur
    const currentRace = RACES_INFO[raceKey] || null;

    // La classe vient maintenant uniquement du Gacha : profile.classe contient
    // directement le nom complet (ex: "Soldat ⚔️"), pas une clé de CLASSES.
    const classeName = profile.classe || null;

    document.getElementById("main-content").innerHTML = `
        <div class="page">
            <div class="profile-header">
                <img src="${avatarUrl}" alt="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                <div>
                    <h1>${profile.global_name || profile.username || "Joueur"}</h1>
                    <div class="meta">
                        <span>🏅 Rang #${profile.rank ?? "?"}</span>
                        <span title="Points disponibles à dépenser (hors dépenses passées)">💠 ${fmt(profile.total_points)} pts disponibles</span>
                        ${profile.race && profile.race !== "Aucune" ? `<span class="tag gold">${RACE_ICONS[raceKey] || "🧬"} ${profile.race}</span>` : '<span class="tag">Aucune race</span>'}
                        ${classeName ? `<span class="tag purple">${classeName}</span>` : '<span class="tag">Aucune classe</span>'}
                        <span>🎨 ${profile.pixels_remaining ?? 0} pixels restants</span>
                    </div>
                </div>
            </div>

            <section>
                <h2>Points par catégorie</h2>
                <div class="activity-container">
                    <div class="activity-row">
                        <div class="activity-label">
                            <span>🎙️ Vocal (Minutes converties)</span>
                            <span class="pts">${fmt(vocalPoints)} pts</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: ${vocalPct}%"></div>
                        </div>
                    </div>
                    <div class="activity-row">
                        <div class="activity-label">
                            <span>💬 Messages Envoyés</span>
                            <span class="pts">${fmt(messagePoints)} pts</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: ${messagePct}%"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2>Fiche de Personnage RPG</h2>
                <div class="rpg-grid">

                    <div class="rpg-card ${currentRace ? 'active-card' : ''}">
                        <div style="font-size: .75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom:.2rem">Race active</div>
                        <div class="rpg-name">${currentRace ? `${currentRace.icon} ${currentRace.name}` : "🧬 Aucune Race"}</div>
                        <div class="rpg-desc">${currentRace ? currentRace.desc : "Tire la roue Gacha pour obtenir ta race !"}</div>
                        ${currentRace ? `<div class="rpg-bonus">Bonus racial : <span>${currentRace.bonus}</span></div>` : ""}
                    </div>

                    <div class="rpg-card ${classeName ? 'active-card' : ''}">
                        <div style="font-size: .75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom:.2rem">Classe active</div>
                        ${classeName
                            ? `
                                <div class="rpg-name">${classeName}</div>
                                <div class="rpg-desc">Obtenue via le Gacha — change uniquement si tu retires.</div>
                              `
                            : `
                                <div class="rpg-name">🎭 Aucune classe</div>
                                <div class="rpg-desc">Tire la roue Gacha pour obtenir ta classe !</div>
                              `
                        }
                    </div>

                </div>
            </section>

            <section>
                <div class="card" style="text-align:center;padding:1.5rem">
                    <p style="color:var(--muted);font-size:.9rem;margin-bottom:1rem">
                        🎰 Ta classe et ta race sont déterminées par le Gacha — chaque tirage remplace l'ancienne, sans retour en arrière possible.
                    </p>
                    <a href="gacha.html" class="btn-primary" style="display:inline-block">Aller au Gacha →</a>
                </div>
            </section>

            <section>
                <h2>Matériaux</h2>
                <div class="card">
                    <div class="materials" id="materials-list"></div>
                </div>
            </section>

            <section>
                <h2>Mondes débloqués</h2>
                <div class="card">
                    <div class="world-list" id="world-list"></div>
                </div>
            </section>
        </div>
    `;

    // Remplissage Matériaux
    const matContainer = document.getElementById("materials-list");
    if (matContainer) {
        const mats = profile.materials || {};
        const hasMats = Object.values(mats).some(v => v > 0);
        if (!hasMats) {
            matContainer.innerHTML = `<span style="color:var(--muted);font-size:.9rem">Aucun matériau — va à la <a href="shop.html">boutique</a> !</span>`;
        } else {
            for (const [key, qty] of Object.entries(mats)) {
                if (qty > 0) {
                    matContainer.innerHTML += `
                        <div class="mat-badge">
                            <span class="mat-icon">${MAT_ICONS[key] || "📦"}</span>
                            <span>${qty}×</span>
                        </div>`;
                }
            }
        }
    }

    // Remplissage Mondes
    const worldList = document.getElementById("world-list");
    if (worldList) {
        const unlocked = profile.unlocked_worlds || ["monde_1"];
        for (const [id, world] of Object.entries(WORLDS)) {
            const isUnlocked = unlocked.includes(id);
            worldList.innerHTML += `
                <div class="world-badge ${isUnlocked ? "unlocked" : "locked"}">
                    ${world.icon} ${world.name} ${isUnlocked ? "✓" : "🔒"}
                </div>`;
        }
    }
}

init().catch(e => {
    console.error(e);
    document.getElementById("main-content").innerHTML = `<div class="loader">Erreur : ${e.message}</div>`;
});
</script>
</body>
</html>
