<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tree — Serveur Vacances</title>
    <link rel="stylesheet" href="static/css/global.css">
    <style>
        body { overflow: hidden; }

        .st-layout {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* ── Panneau latéral ── */
        .st-sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.25rem;
            gap: 1rem;
        }
        .st-sidebar h2 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

        .mat-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: .5rem .75rem;
            background: var(--bg3); border-radius: 8px;
            font-size: .9rem;
        }
        .mat-row .qty { font-weight: 700; color: var(--accent); }

        /* Carte nœud sélectionné */
        #node-detail {
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem;
            display: none; flex-direction: column; gap: .6rem;
        }
        #node-detail.visible { display: flex; }
        #node-detail h3 { font-size: 1rem; font-weight: 800; }
        #node-detail p  { font-size: .85rem; color: var(--muted); line-height: 1.5; }
        .cost-list { display: flex; flex-direction: column; gap: .3rem; }
        .cost-row {
            display: flex; align-items: center; justify-content: space-between;
            font-size: .85rem;
        }
        .cost-row.ok   { color: var(--green); }
        .cost-row.nok  { color: var(--red); }

        #btn-unlock {
            margin-top: .5rem;
            width: 100%;
            padding: .7rem;
        }
        .unlocked-badge {
            background: rgba(61,214,140,.15); color: var(--green);
            border: 1px solid var(--green); border-radius: 8px;
            padding: .5rem .75rem; font-size: .85rem; font-weight: 700;
            text-align: center;
        }

        /* ── Canvas SVG ── */
        .st-canvas {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(124,92,252,.06) 0%, transparent 70%), var(--bg);
            cursor: grab;
        }
        .st-canvas:active { cursor: grabbing; }

        #st-svg {
            position: absolute;
            top: 0; left: 0;
            user-select: none;
        }

        /* Nœuds SVG */
        .st-node { cursor: pointer; }
        .st-node .node-bg {
            transition: filter .15s;
        }
        .st-node:hover .node-bg { filter: brightness(1.3); }

        /* Zoom controls */
        .zoom-controls {
            position: absolute; bottom: 1rem; right: 1rem;
            display: flex; flex-direction: column; gap: .3rem;
        }
        .zoom-btn {
            width: 36px; height: 36px;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s;
        }
        .zoom-btn:hover { background: var(--bg3); }

        /* Mini-légende */
        .legend {
            position: absolute; bottom: 1rem; left: 1rem;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 10px; padding: .75rem 1rem;
            display: flex; flex-direction: column; gap: .4rem; font-size: .8rem;
        }
        .legend-row { display: flex; align-items: center; gap: .5rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        @media (max-width: 700px) {
            .st-sidebar { width: 220px; min-width: 220px; }
        }
    </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="st-layout">
    <div class="st-sidebar">
        <div>
            <h2 style="margin-bottom:.75rem">🧱 Matériaux</h2>
            <div id="mat-list"><div class="loader" style="min-height:60px"><div class="spinner"></div></div></div>
        </div>

        <div>
            <h2 style="margin-bottom:.75rem">🔍 Nœud sélectionné</h2>
            <div id="node-detail">
                <h3 id="nd-name"></h3>
                <p id="nd-desc"></p>
                <div>
                    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em">Coût</div>
                    <div class="cost-list" id="nd-cost"></div>
                </div>
                <div id="nd-requires" style="font-size:.8rem;color:var(--muted)"></div>
                <div id="nd-action"></div>
            </div>
            <div id="node-hint" style="font-size:.85rem;color:var(--muted);padding:.5rem 0">
                Clique sur un nœud pour voir les détails.
            </div>
        </div>

        <div>
            <h2 style="margin-bottom:.75rem">🌍 Mondes débloqués</h2>
            <div id="worlds-list"></div>
        </div>
    </div>

    <div class="st-canvas" id="st-canvas">
        <svg id="st-svg" xmlns="http://www.w3.org/2000/svg"></svg>

        <div class="zoom-controls">
            <div class="zoom-btn" id="zoom-in">+</div>
            <div class="zoom-btn" id="zoom-reset">⌂</div>
            <div class="zoom-btn" id="zoom-out">−</div>
        </div>

        <div class="legend">
            <div style="font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem">Légende</div>
            <div class="legend-row"><div class="legend-dot" style="background:#3dd68c"></div> Débloqué</div>
            <div class="legend-row"><div class="legend-dot" style="background:#7c5cfc"></div> Disponible</div>
            <div class="legend-row"><div class="legend-dot" style="background:#f5c542"></div> Achetable</div>
            <div class="legend-row"><div class="legend-dot" style="background:#2a2d4a"></div> Verrouillé</div>
        </div>
    </div>
</div>

<script type="module">
import { api } from "./static/js/api.js";
import { renderNav, loadNavUser, requireAuth, toast, fmt } from "./static/js/ui.js";

renderNav("skilltree");
if (!requireAuth()) throw new Error("not auth");

// Emojis des matériaux alignés sur le Back-end (Clés en Anglais)
const MAT_ICONS = { wood: "🪵", stone: "🪨", iron: "⚙️", gold: "👑", diamond: "💎", netherite: "🔥" };
const WORLD_ICONS = { monde_1:"🌲", monde_2:"🔥", monde_3:"🌊", monde_4:"⛰️" };

// Traduction visuelle pour l'affichage de l'interface
const MAT_LABELS = { wood: "bois", stone: "pierre", iron: "fer", gold: "magie", diamond: "cristal", netherite: "netherite" };

// ── État ──────────────────────────────────────────────────────────────────
let treeData   = null;
let selected   = null;

// ── Pan & Zoom ─────────────────────────────────────────────────────────────
const canvas = document.getElementById("st-canvas");
const svg    = document.getElementById("st-svg");

const VIEW = { x: 0, y: 0, scale: 1 };
const W = 900, H = 800; // dimensions internes SVG

function applyTransform() {
    svg.setAttribute("transform-origin", "0 0");
    svg.style.transform = `translate(${VIEW.x}px, ${VIEW.y}px) scale(${VIEW.scale})`;
}

function setInitialView() {
    const r = canvas.getBoundingClientRect();
    VIEW.scale = Math.min(r.width / W, r.height / H) * 0.85;
    VIEW.x = (r.width  - W * VIEW.scale) / 2;
    VIEW.y = (r.height - H * VIEW.scale) / 2;
    applyTransform();
}

// Drag
let drag = null;
canvas.addEventListener("mousedown", e => {
    if (e.target.closest(".st-node")) return;
    drag = { sx: e.clientX - VIEW.x, sy: e.clientY - VIEW.y };
});
window.addEventListener("mousemove", e => {
    if (!drag) return;
    VIEW.x = e.clientX - drag.sx;
    VIEW.y = e.clientY - drag.sy;
    applyTransform();
});
window.addEventListener("mouseup", () => drag = null);

// Wheel zoom
canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.91;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    VIEW.x = mx - (mx - VIEW.x) * factor;
    VIEW.y = my - (my - VIEW.y) * factor;
    VIEW.scale *= factor;
    applyTransform();
}, { passive: false });

document.getElementById("zoom-in").onclick    = () => { VIEW.scale *= 1.2; applyTransform(); };
document.getElementById("zoom-out").onclick   = () => { VIEW.scale *= 0.83; applyTransform(); };
document.getElementById("zoom-reset").onclick = setInitialView;

// ── Rendu SVG ─────────────────────────────────────────────────────────────
const NODE_R = 44; // rayon des cercles

function nodeColor(node) {
    if (node.unlocked)   return "#3dd68c";
    if (node.affordable) return "#f5c542";
    if (node.can_unlock) return "#7c5cfc";
    return "#2a2d4a";
}
function nodeTextColor(node) {
    if (node.unlocked)   return "#0e1a14";
    if (node.affordable) return "#1a1500";
    return "#e2e4f0";
}

function renderTree(data) {
    treeData = data;
    svg.innerHTML = "";
    svg.setAttribute("width", W);
    svg.setAttribute("height", H);

    // Sécurisation totale des listes pour éviter les crashs si variables absentes
    const nodes = data && data.nodes ? data.nodes : [];
    const byId  = Object.fromEntries(nodes.map(n => [n.id, n]));

    // ── Lignes de connexion ──────────────────────────────────────────────
    const lineGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    lineGroup.setAttribute("class", "lines");

    for (const node of nodes) {
        const requirements = node.requires || [];
        for (const req of requirements) {
            const parent = byId[req];
            if (!parent) continue;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", parent.position?.x || 0);
            line.setAttribute("y1", parent.position?.y || 0);
            line.setAttribute("x2", node.position?.x || 0);
            line.setAttribute("y2", node.position?.y || 0);
            line.setAttribute("stroke", node.unlocked && parent.unlocked ? "#3dd68c" : "#2a2d4a");
            line.setAttribute("stroke-width", "3");
            line.setAttribute("stroke-dasharray", node.unlocked ? "none" : "8 5");
            line.setAttribute("stroke-linecap", "round");
            lineGroup.appendChild(line);
        }
    }
    svg.appendChild(lineGroup);

    // ── Nœuds ────────────────────────────────────────────────────────────
    for (const node of nodes) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "st-node");
        g.setAttribute("transform", `translate(${node.position?.x || 0},${node.position?.y || 0})`);
        g.dataset.id = node.id;

        const color = nodeColor(node);
        const tc    = nodeTextColor(node);

        // Halo si achetable
        if (node.affordable) {
            const halo = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            halo.setAttribute("r", NODE_R + 6);
            halo.setAttribute("fill", "rgba(245,197,66,.15)");
            halo.setAttribute("class", "node-halo");
            g.appendChild(halo);
        }

        // Cercle principal
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", NODE_R);
        circle.setAttribute("fill", color);
        circle.setAttribute("class", "node-bg");
        circle.setAttribute("stroke", node === selected ? "#fff" : "none");
        circle.setAttribute("stroke-width", "2.5");
        g.appendChild(circle);

        // Icône (emoji d'état dynamique)
        const fo = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
        fo.setAttribute("x", -24); fo.setAttribute("y", -32);
        fo.setAttribute("width", 48); fo.setAttribute("height", 30);
        fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="text-align:center;font-size:20px;line-height:1">${node.unlocked ? "✅" : node.affordable ? "💰" : node.can_unlock ? "🔓" : "🔒"}</div>`;
        g.appendChild(fo);

        // Nom (coupé en 2 lignes si nécessaire)
        const words = (node.name || "").split(" ");
        const line1 = words.slice(0, Math.ceil(words.length / 2)).join(" ");
        const line2 = words.slice(Math.ceil(words.length / 2)).join(" ");
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("text-anchor", "middle");
        t1.setAttribute("y", line2 ? "6" : "12");
        t1.setAttribute("font-size", "11");
        t1.setAttribute("font-weight", "700");
        t1.setAttribute("fill", tc);
        t1.setAttribute("font-family", "Inter,system-ui,sans-serif");
        t1.textContent = line1;
        g.appendChild(t1);

        if (line2) {
            const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t2.setAttribute("text-anchor", "middle");
            t2.setAttribute("y", "20");
            t2.setAttribute("font-size", "11");
            t2.setAttribute("font-weight", "700");
            t2.setAttribute("fill", tc);
            t2.setAttribute("font-family", "Inter,system-ui,sans-serif");
            t2.textContent = line2;
            g.appendChild(t2);
        }

        // Événement Clic
        g.addEventListener("click", () => selectNode(node));
        svg.appendChild(g);
    }
}

// ── Sélection nœud ────────────────────────────────────────────────────────
function selectNode(node) {
    selected = node;
    document.querySelectorAll(".st-node .node-bg").forEach(c => c.setAttribute("stroke", "none"));
    const el = svg.querySelector(`[data-id="${node.id}"] .node-bg`);
    if (el) el.setAttribute("stroke", "#fff");

    const detail   = document.getElementById("node-detail");
    const hint     = document.getElementById("node-hint");
    detail.classList.add("visible");
    hint.style.display = "none";

    document.getElementById("nd-name").textContent = node.name;
    document.getElementById("nd-desc").textContent = node.description;

    // Gestion robuste du Coût
    const costEl = document.getElementById("nd-cost");
    const nodeCost = node.cost || {};
    costEl.innerHTML = Object.entries(nodeCost).map(([mat, qty]) => {
        // Double détection (gestion clés anglaises et fallback clés françaises)
        const have = treeData.materials[mat] || treeData.materials[MAT_LABELS[mat]] || 0;
        const ok   = have >= qty;
        const displayName = MAT_LABELS[mat] || mat;
        return `<div class="cost-row ${ok ? "ok" : "nok"}">
            <span>${MAT_ICONS[mat] || "📦"} ${displayName}</span>
            <span>${have} / ${qty} ${ok ? "✓" : "✗"}</span>
        </div>`;
    }).join("");

    // Gestion robuste des Prérequis
    const reqEl = document.getElementById("nd-requires");
    const requirements = node.requires || [];
    const allNodes = treeData.nodes || [];
    const unlockedList = treeData.unlocked || [];

    reqEl.innerHTML = requirements.length
        ? `Requiert : ${requirements.map(r => {
            const rn = allNodes.find(n => n.id === r);
            const ok = unlockedList.includes(r);
            return `<span style="color:${ok ? "var(--green)" : "var(--red)"}">${rn?.name || r}</span>`;
          }).join(", ")}`
        : "";

    // Bouton Action Dynamique
    const actionEl = document.getElementById("nd-action");
    if (node.unlocked) {
        actionEl.innerHTML = `<div class="unlocked-badge">✅ Déjà débloqué${node.unlocks ? ` — débloque ${node.unlocks}` : ""}</div>`;
    } else if (node.affordable) {
        actionEl.innerHTML = `<button class="btn-gold" id="btn-unlock">🔓 Débloquer</button>`;
        document.getElementById("btn-unlock").onclick = () => unlock(node.id);
    } else if (node.can_unlock) {
        actionEl.innerHTML = `<button class="btn-outline" disabled style="width:100%;padding:.7rem;opacity:.5">Pas assez de matériaux</button>`;
    } else {
        actionEl.innerHTML = `<button class="btn-outline" disabled style="width:100%;padding:.7rem;opacity:.5">Prérequis manquants</button>`;
    }
}

// ── Déblocage ──────────────────────────────────────────────────────────────
async function unlock(nodeId) {
    try {
        const res = await api.unlockNode(nodeId);
        toast(`✅ ${selected.name} débloqué !`, "success");
        if (res.new_world) toast(`🌍 Nouveau monde débloqué : ${res.new_world} !`, "success");
        
        const fresh = await api.getSkillTree();
        renderSidebar(fresh);
        renderTree(fresh);
        
        const updatedNode = (fresh.nodes || []).find(n => n.id === nodeId);
        if (updatedNode) selectNode(updatedNode);
    } catch(e) {
        toast(e.message, "error");
    }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar(data) {
    // Matériaux
    const matEl = document.getElementById("mat-list");
    const mats  = data && data.materials ? data.materials : {};
    
    // On s'assure qu'on liste au moins un truc si le joueur récolte
    const hasMat = Object.values(mats).some(v => v > 0);
    if (!hasMat) {
        matEl.innerHTML = `<div style="font-size:.85rem;color:var(--muted)">Aucun matériau — <a href="oneblock.html">va miner →</a></div>`;
    } else {
        matEl.innerHTML = Object.entries(MAT_ICONS).map(([key, icon]) => {
            const qty = mats[key] || mats[MAT_LABELS[key]] || 0;
            return `
            <div class="mat-row">
                <span>${icon} ${MAT_LABELS[key] || key}</span>
                <span class="qty">${qty}</span>
            </div>`;
        }).join("");
    }

    // Mondes Débloqués (.filter sécurisé avec '|| []' pour éradiquer l'erreur)
    const worldEl = document.getElementById("worlds-list");
    const nodesList = data && data.nodes ? data.nodes : [];
    const unlockedWorlds = nodesList.filter(n => n && n.unlocked && n.unlocks).map(n => n.unlocks);
    
    const allWorlds = { monde_1: "La Forêt des Débuts", monde_2: "Les Plaines de Feu", monde_3: "L'Océan Profond", monde_4: "Le Sommet des Dieux" };
    worldEl.innerHTML = Object.entries(allWorlds).map(([id, name]) => {
        const isUnlocked = id === "monde_1" || unlockedWorlds.includes(id);
        return `<div style="display:flex;align-items:center;gap:.5rem;padding:.4rem 0;font-size:.85rem;color:${isUnlocked ? "var(--green)" : "var(--muted)"}">
            ${WORLD_ICONS[id] || "🌍"} ${name} ${isUnlocked ? "✓" : "🔒"}
        </div>`;
    }).join("");
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
    const [data, profile] = await Promise.all([api.getSkillTree(), api.getProfile()]);
    window.__profile = profile;
    await loadNavUser();

    renderSidebar(data);
    renderTree(data);
    setInitialView();
}

window.addEventListener("resize", setInitialView);
init().catch(console.error);
</script>
</body>
</html>
